<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age calculator</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
   <main>
    <form>
        <fieldset>
            <legend class="sr-only">Enter your birth date</legend>
            <div class="input-group">
                <label for="day">Day</label>
                <input type= "number" id="day" autocomplete="off" placeholder="DD" name="day">
                <small id="day-msg" class="error-msg">This field is required</small>
            </div>
           
            <div class="input-group">
                <label for="month">Month</label>
                <input type= "number" id="month" autocomplete="off" placeholder="MM" name="month">
                <small  id="month-msg"   class="error-msg">This field is required</small>
            </div>

            <div class="input-group">
                <label for="year">Year</label>
                <input type= "number" id="year" autocomplete="off" placeholder="YYYY" name="year">
                <small id="year-msg" class="error-msg">This field is required</small>
            </div>
        </fieldset>

        <button type="submit" aria-label="Calculate Age">
            <img src="icon-arrow.svg" alt="submit button">
        </button>
    </form>

    <div class="results"  aria-live="polite">
        <p>
            <span class="number" id="years-result" aria-hidden="true">--</span>
            <span class="sr-only">Empty</span>
            years
        </p>

        <p>
            <span class="number" id="months-result" aria-hidden="true">--</span>
            <span class="sr-only">Empty</span>
            months
        </p>

        <p>
            <span class="number" id="days-result" aria-hidden="true">--</span>
            <span class="sr-only">Empty</span>
            days
        </p>
    </div>
   </main>
   <script type="module"   src="script.js"></script>
</body>
</html>
